---
- name: Deploy node app on EC2
  hosts: all
  become: yes
  vars:
    app_dir: /opt/app
    app_port: 3000
    app_name: nodeapp2

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required system packages
      apt:
        name:
          - curl
          - git
          - nginx
          - ufw
        state: present

    - name: Install Node.js 24.x
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
        apt-get install -y nodejs
      args:
        creates: /usr/bin/node

    - name: Install PM2 globally
      npm:
        name: pm2
        global: yes
        state: present

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Pull app from GitHub
      git:
        repo: "https://github.com/{{ lookup('env', 'GITHUB_REPOSITORY') }}.git"
        dest: "{{ app_dir }}"
        version: HEAD
        force: yes
      environment:
        GIT_TERMINAL_PROMPT: "0"
      become: yes
      become_user: ubuntu

    - name: Build .env file
      copy:
        dest: "{{ app_dir }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: '0600'
        content: |
          {% if node_env_database_url is defined and node_env_database_url != '' %}
          DATABASE_URL={{ node_env_database_url }}
          {% endif %}
          {% if node_env_mongo_uri is defined and node_env_mongo_uri != '' %}
          MONGO_URI={{ node_env_mongo_uri }}
          {% endif %}
          {% if node_env_db_host is defined and node_env_db_host != '' %}
          DB_HOST={{ node_env_db_host }}
          {% endif %}
          {% if node_env_db_port is defined and node_env_db_port != '' %}
          DB_PORT={{ node_env_db_port }}
          {% endif %}
          {% if node_env_db_name is defined and node_env_db_name != '' %}
          DB_NAME={{ node_env_db_name }}
          {% endif %}
          {% if node_env_db_user is defined and node_env_db_user != '' %}
          DB_USER={{ node_env_db_user }}
          {% endif %}
          {% if node_env_db_password is defined and node_env_db_password != '' %}
          DB_PASSWORD={{ node_env_db_password }}
          {% endif %}
          PORT=3000
          HOST=0.0.0.0

    - name: Install local database if requested
      when: install_db is defined and install_db | string | lower == 'true'
      block:
        - name: Install PostgreSQL
          when: db_type is defined and db_type | lower == 'postgres'
          block:
            - name: Install PostgreSQL packages
              apt:
                name:
                  - postgresql
                  - postgresql-contrib
                  - libpq-dev
                state: present

            - name: Start and enable PostgreSQL
              service:
                name: postgresql
                state: started
                enabled: yes

            - name: Set pg_hba to md5 auth
              shell: |
                HBA=$(find /etc/postgresql -name pg_hba.conf | head -1)
                sed -i 's/^local\s\+all\s\+all\s\+peer/local all all md5/' "$HBA"
                sed -i 's/^host\s\+all\s\+all\s\+127.0.0.1\/32\s\+ident/host all all 127.0.0.1\/32 md5/' "$HBA"
                systemctl reload postgresql
              args:
                executable: /bin/bash

            - name: Create PostgreSQL database and user
              shell: |
                DB_NAME="{{ db_name | default('appdb') }}"
                DB_USER="{{ db_username | default('appuser') }}"
                DB_PASS="{{ db_password | default('apppassword') }}"
                sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='$DB_USER'" | grep -q 1 || \
                  sudo -u postgres psql -c "CREATE USER $DB_USER WITH PASSWORD '$DB_PASS';"
                sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='$DB_NAME'" | grep -q 1 || \
                  sudo -u postgres psql -c "CREATE DATABASE $DB_NAME OWNER $DB_USER;"
                sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE $DB_NAME TO $DB_USER;"
              args:
                executable: /bin/bash

        - name: Install MySQL
          when: db_type is defined and db_type | lower == 'mysql'
          block:
            - name: Install MySQL packages
              apt:
                name:
                  - mysql-server
                  - mysql-client
                state: present

            - name: Start and enable MySQL
              service:
                name: mysql
                state: started
                enabled: yes

            - name: Create MySQL database and user
              shell: |
                DB_NAME="{{ db_name | default('appdb') }}"
                DB_USER="{{ db_username | default('appuser') }}"
                DB_PASS="{{ db_password | default('apppassword') }}"
                mysql -u root -e "CREATE DATABASE IF NOT EXISTS \`$DB_NAME\`;"
                mysql -u root -e "CREATE USER IF NOT EXISTS '$DB_USER'@'localhost' IDENTIFIED BY '$DB_PASS';"
                mysql -u root -e "GRANT ALL PRIVILEGES ON \`$DB_NAME\`.* TO '$DB_USER'@'localhost';"
                mysql -u root -e "FLUSH PRIVILEGES;"
              args:
                executable: /bin/bash

        - name: Install MongoDB
          when: db_type is defined and db_type | lower == 'mongodb'
          block:
            - name: Add MongoDB apt key
              shell: |
                curl -fsSL https://www.mongodb.org/static/pgp/server-7.0.asc | \
                  gpg --dearmor -o /usr/share/keyrings/mongodb-server-7.0.gpg
              args:
                creates: /usr/share/keyrings/mongodb-server-7.0.gpg

            - name: Add MongoDB apt repository
              copy:
                dest: /etc/apt/sources.list.d/mongodb-org-7.0.list
                content: |
                  deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse
                mode: '0644'

            - name: Install MongoDB
              apt:
                name: mongodb-org
                state: present
                update_cache: yes

            - name: Start and enable MongoDB
              service:
                name: mongod
                state: started
                enabled: yes

            - name: Initialize MongoDB database and user
              shell: |
                DB_NAME="{{ db_name | default('appdb') }}"
                DB_USER="{{ db_username | default('appuser') }}"
                DB_PASS="{{ db_password | default('apppassword') }}"
                mongosh --quiet "$DB_NAME" --eval "
                  try {
                    db.createUser({ user: '$DB_USER', pwd: '$DB_PASS', roles: [{ role: 'readWrite', db: '$DB_NAME' }] });
                  } catch(e) {
                    if (!e.message.includes('already exists')) throw e;
                  }
                "
              args:
                executable: /bin/bash

    - name: Install npm dependencies
      npm:
        path: "{{ app_dir }}"
        state: present
      become: yes
      become_user: ubuntu

    - name: Start app with PM2
      shell: |
        pm2 delete app 2>/dev/null || true
        set -a
        [ -f "{{ app_dir }}/.env" ] && . "{{ app_dir }}/.env"
        export PORT="${PORT:-3000}"
        export HOST="${HOST:-0.0.0.0}"
        set +a
        if [ -f "{{ app_dir }}/package.json" ] && grep -q '"start"' "{{ app_dir }}/package.json"; then
          pm2 start npm --name app -- start --update-env
        elif [ -f "{{ app_dir }}/server.js" ]; then
          pm2 start "{{ app_dir }}/server.js" --name app --update-env
        elif [ -f "{{ app_dir }}/index.js" ]; then
          pm2 start "{{ app_dir }}/index.js" --name app --update-env
        elif [ -f "{{ app_dir }}/app.js" ]; then
          pm2 start "{{ app_dir }}/app.js" --name app --update-env
        else
          echo "No Node.js entrypoint found in {{ app_dir }}" >&2
          exit 1
        fi
        pm2 save
      args:
        executable: /bin/bash
        chdir: "{{ app_dir }}"
      become: yes
      become_user: ubuntu

    - name: Install PM2 systemd startup service
      shell: |
        env PATH=$PATH:/usr/bin pm2 startup systemd -u ubuntu --hp /home/ubuntu
      args:
        creates: /etc/systemd/system/pm2-ubuntu.service

    - name: Configure nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-enabled/app
        mode: '0644'
        content: |
          server {
              listen 80;
              server_name _;
              location / {
                  proxy_pass http://127.0.0.1:{{ app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_cache_bypass $http_upgrade;
              }
          }
      notify: reload nginx

    - name: Remove default nginx config
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: reload nginx

    - name: Enable and start nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Wait for app to be reachable on port 3000
      wait_for:
        host: 127.0.0.1
        port: 3000
        timeout: 120
        delay: 10
      register: app_wait
      ignore_errors: yes

    - name: Print PM2 logs if app did not start
      shell: pm2 logs --lines 100 app --nostream
      become: yes
      become_user: ubuntu
      when: app_wait is failed
      ignore_errors: yes

    - name: Print PM2 process list if app did not start
      shell: pm2 list
      become: yes
      become_user: ubuntu
      when: app_wait is failed
      ignore_errors: yes
      register: pm2_list

    - name: Show PM2 process list
      debug:
        var: pm2_list.stdout_lines
      when: app_wait is failed and pm2_list is defined

    - name: Check if .env file exists and show contents
      shell: cat "{{ app_dir }}/.env" 2>/dev/null || echo "No .env file found"
      when: app_wait is failed
      ignore_errors: yes
      register: env_contents

    - name: Show .env contents
      debug:
        var: env_contents.stdout_lines
      when: app_wait is failed and env_contents is defined

    - name: Check npm start directly
      shell: |
        cd "{{ app_dir }}"
        set -a
        [ -f .env ] && . .env
        set +a
        timeout 10 node server.js 2>&1 || true
      args:
        executable: /bin/bash
      become: yes
      become_user: ubuntu
      when: app_wait is failed
      ignore_errors: yes
      register: node_direct

    - name: Show direct node output
      debug:
        var: node_direct.stdout_lines
      when: app_wait is failed and node_direct is defined

    - name: Show PM2 environment for app process
      shell: pm2 env app 2>/dev/null || echo "PM2 env not available"
      become: yes
      become_user: ubuntu
      when: app_wait is failed
      ignore_errors: yes
      register: pm2_env

    - name: Display PM2 env output
      debug:
        var: pm2_env.stdout_lines
      when: app_wait is failed and pm2_env is defined

    - name: Restart app with explicit env vars from .env
      shell: |
        set -a
        [ -f "{{ app_dir }}/.env" ] && . "{{ app_dir }}/.env"
        export PORT="${PORT:-3000}"
        export HOST="${HOST:-0.0.0.0}"
        set +a
        pm2 delete app 2>/dev/null || true
        cd "{{ app_dir }}"
        PORT=3000 HOST=0.0.0.0 pm2 start npm --name app -- start --update-env
        pm2 save
      args:
        executable: /bin/bash
        chdir: "{{ app_dir }}"
      become: yes
      become_user: ubuntu
      when: app_wait is failed
      ignore_errors: yes

    - name: Wait again after restart attempt
      wait_for:
        host: 127.0.0.1
        port: 3000
        timeout: 60
        delay: 5
      register: app_wait2
      when: app_wait is failed
      ignore_errors: yes

    - name: Collect PM2 logs after second wait failure
      shell: pm2 logs --lines 150 app --nostream 2>&1 || true
      become: yes
      become_user: ubuntu
      when: app_wait is failed and (app_wait2 is not defined or app_wait2 is failed)
      ignore_errors: yes
      register: pm2_logs_final

    - name: Show PM2 logs after second wait failure
      debug:
        var: pm2_logs_final.stdout_lines
      when: app_wait is failed and (app_wait2 is not defined or app_wait2 is failed) and pm2_logs_final is defined

    - name: Check node version and package.json
      shell: |
        node --version
        cat "{{ app_dir }}/package.json" 2>/dev/null || echo "no package.json"
      args:
        executable: /bin/bash
      become: yes
      become_user: ubuntu
      when: app_wait is failed and (app_wait2 is not defined or app_wait2 is failed)
      ignore_errors: yes
      register: node_info

    - name: Show node info
      debug:
        var: node_info.stdout_lines
      when: app_wait is failed and (app_wait2 is not defined or app_wait2 is failed) and node_info is defined

    - name: Try running app directly with node for diagnostics
      shell: |
        cd "{{ app_dir }}"
        set -a
        [ -f .env ] && . .env
        set +a
        timeout 15 node server.js 2>&1 || true
      args:
        executable: /bin/bash
      become: yes
      become_user: ubuntu
      when: app_wait is failed and (app_wait2 is not defined or app_wait2 is failed)
      ignore_errors: yes
      register: node_direct_final

    - name: Show direct node output final
      debug:
        var: node_direct_final.stdout_lines
      when: app_wait is failed and (app_wait2 is not defined or app_wait2 is failed) and node_direct_final is defined

    - name: Fail if app did not start
      fail:
        msg: "App did not start on port 3000 within 120 seconds"
      when: app_wait is failed and (app_wait2 is not defined or app_wait2 is failed)

    - name: Print server IP
      debug:
        msg: "server_ip={{ ansible_host }}"

  handlers:
    - name: reload nginx
      service:
        name: nginx
        state: reloaded